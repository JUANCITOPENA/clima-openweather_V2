<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Neón | OpenWeather</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Propio -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="container main-container d-flex flex-column justify-content-center align-items-center min-vh-100">
        <div class="weather-app-wrapper w-100" style="max-width: 500px;">
            <h1 class="text-center neon-title mb-4"><i class="fa-solid fa-cloud-bolt"></i> Clima Neón</h1>
            
            <div class="input-group mb-4 neon-input-group">
                <input type="text" id="cityInput" class="form-control neon-input" placeholder="Ingresa una ciudad (ej. Madrid)..." autocomplete="off">
                <button class="btn neon-btn" id="searchBtn" type="button">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <!-- Contenedor donde aparecerán las tarjetas del clima -->
            <div id="weatherContainer" class="d-flex flex-column gap-3"></div>
        </div>
    </div>

    <!-- Script tipo módulo para Vite -->
    <script type="module" src="./main.js"></script>
</body>
</html>
